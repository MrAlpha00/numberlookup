<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Data Breach</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to access your OSINT toolkit</p>
        </div>
        
        <!-- Google Sign-In Button -->
        <div class="google-btn-container">
          <div id="googleSignInBtn"></div>
        </div>
        
        <div class="form-divider">or continue with email</div>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <div class="form-checkbox">
              <input type="checkbox" id="remember">
              <label for="remember">Remember me</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    // Toggle password visibility
    function togglePassword(inputId) {
      var input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
    
    // Initialize Google Sign-In when page loads
    window.onload = function() {
      initGoogleSignIn();
    };
    
    function initGoogleSignIn() {
      if (typeof google !== 'undefined' && google.accounts) {
        try {
          google.accounts.id.initialize({
            client_id: 'YOUR_CLIENT_ID.apps.googleusercontent.com',
            callback: handleGoogleCredential,
            auto_select: false,
            cancel_on_tap_outside: false
          });
          
          var btn = document.getElementById('googleSignInBtn');
          if (btn) {
            google.accounts.id.renderButton(btn, {
              theme: 'outline',
              size: 'large',
              width: '100%',
              text: 'signin_with'
            });
          }
        } catch(e) {
          console.log('Google Sign-In not configured');
        }
      } else {
        var script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = initGoogleSignIn;
        script.onerror = function() {
          console.log('Could not load Google Sign-In script');
        };
        document.head.appendChild(script);
      }
    }
    
    function handleGoogleCredential(response) {
      try {
        var payload = JSON.parse(atob(response.credential.split('.')[1]));
        var session = {
          email: payload.email,
          name: payload.name,
          picture: payload.picture,
          googleId: payload.sub,
          loggedIn: true,
          timestamp: Date.now(),
          loginType: 'google'
        };
        localStorage.setItem('databreach_session', JSON.stringify(session));
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Auth error:', error);
        alert('Authentication failed. Please try again.');
      }
    }
    
    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      
      // Check users
      var users = JSON.parse(localStorage.getItem('databreach_users') || '[]');
      var user = users.find(function(u) { return u.email === email && u.password === password; });
      
      if (user) {
        var session = {
          email: user.email,
          name: user.name,
          loggedIn: true,
          timestamp: Date.now(),
          loginType: 'email'
        };
        localStorage.setItem('databreach_session', JSON.stringify(session));
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid email or password');
      }
    });
  </script>
</body>
</html>
