<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Data Breach</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
<!-- Load config first -->
  <script src="config.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to access your OSINT toolkit</p>
        </div>
        
        <!-- Google Sign-In - Set your Client ID in script -->
        <button type="button" class="btn oauth-btn" onclick="signInWithGoogle()" style="width: 100%; margin-bottom: 20px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 10px;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.96 20.53 7.7 23 12 23z"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.96 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
        
        <div class="form-divider">or continue with email</div>
        
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group" style="position: relative;">
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
              <button type="button" class="toggle-password" onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <div class="form-checkbox">
              <input type="checkbox" id="remember">
              <label for="remember">Remember me</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    // Google Sign-In function
    function signInWithGoogle() {
      var clientId = window.AppConfig ? window.AppConfig.googleClientId : null;
      
      if (!clientId || clientId === '' || clientId === 'YOUR_CLIENT_ID.apps.googleusercontent.com') {
        alert('Please edit config.js and add your Google Client ID!\n\nGet it from: https://console.cloud.google.com → APIs & Services → Credentials → OAuth Client ID');
        return;
      }
      
      // Redirect to Google OAuth
      var redirectUri = encodeURIComponent(window.location.origin + '/callback.html');
      var scope = encodeURIComponent('email profile');
      var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
        'client_id=' + clientId +
        '&redirect_uri=' + redirectUri +
        '&response_type=token' +
        '&scope=' + scope +
        '&include_granted_scopes=true';
      
      window.location.href = authUrl;
    }
    
    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      
      if (!email || !password) {
        alert('Please enter email and password');
        return;
      }
      
      var users = JSON.parse(localStorage.getItem('databreach_users') || '[]');
      var user = users.find(function(u) { return u.email === email && u.password === password; });
      
      if (user) {
        var session = { email: user.email, name: user.name, loggedIn: true, timestamp: Date.now(), loginType: 'email' };
        localStorage.setItem('databreach_session', JSON.stringify(session));
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid email or password');
      }
    });
  </script>
</body>
</html>
