<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Records - Data Breach</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo"><div class="logo-icon">⚡</div><span>Data Breach</span></a>
      <ul class="nav-links"><li><a href="../dashboard.html">Dashboard</a></li></ul>
      <div class="nav-actions"><button id="logoutBtn" class="btn btn-ghost">Logout</button></div>
    </div>
  </nav>
  <section class="module-page">
    <div class="module-header"><div class="container"><h1>📡 DNS Records</h1><p>Query DNS records (A, AAAA, MX, TXT, NS, CNAME)</p></div></div>
    <div class="module-content">
      <div class="container">
        <form id="dnsForm" class="module-form" data-module="dnsLookup">
          <div class="module-input-group"><label for="domain">Domain</label><input type="text" id="domain" class="form-input" placeholder="Enter domain (e.g., example.com)"></div>
          <div class="module-input-group"><label for="recordType">Record Type</label><select id="recordType"><option value="A">A</option><option value="AAAA">AAAA</option><option value="MX">MX</option><option value="TXT">TXT</option><option value="NS">NS</option><option value="CNAME">CNAME</option></select></div>
          <button type="submit" class="btn btn-primary">Query DNS</button>
        </form>
        <div id="resultContainer" class="result-container"></div>
      </div>
    </div>
  </section>
  <script src="../script.js"></script>
</body>
</html>
