<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Info - Data Breach</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
      </ul>
      <div class="nav-actions">
        <button id="logoutBtn" class="btn btn-ghost">Logout</button>
      </div>
    </div>
  </nav>

  <section class="module-page">
    <div class="module-header">
      <div class="container">
        <h1>🚗 Vehicle Info</h1>
        <p>Indian vehicle registration details lookup</p>
      </div>
    </div>
    <div class="module-content">
      <div class="container">
        <form id="vehicleForm" class="module-form" data-module="vehicleLookup">
          <div class="module-input-group">
            <label for="vehicleNumber">Vehicle Number</label>
            <input type="text" id="vehicleNumber" class="form-input" placeholder="Enter vehicle number (e.g., KA01AB1234)">
          </div>
          <button type="submit" class="btn btn-primary">Lookup Vehicle</button>
        </form>
        <div id="resultContainer" class="result-container"></div>
      </div>
    </div>
  </section>

  <script src="../script.js"></script>
</body>
</html>
