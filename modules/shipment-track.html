<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipment Tracker - Data Breach</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo"><div class="logo-icon">⚡</div><span>Data Breach</span></a>
      <ul class="nav-links"><li><a href="../dashboard.html">Dashboard</a></li></ul>
      <div class="nav-actions"><button id="logoutBtn" class="btn btn-ghost">Logout</button></div>
    </div>

  <section class="module-page">
    <div class="module-header"><div class="container"><h1>📦 Shipment Tracker</h1><p>Track courier shipments</p></div></div>

      </div>
    </div>

  <script src="../script.js"></script>
