<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Lookup - Data Breach</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="ip-lookup.html">IP Lookup</a></li>
      </ul>
      <div class="nav-actions">
        <button id="logoutBtn" class="btn btn-ghost">Logout</button>
      </div>
    </div>
  </nav>

  <section class="module-page">
    <div class="module-header">
      <div class="container">
        <h1>🌐 IP Lookup</h1>
        <p>Get IP address location, ISP, organization, and network information</p>
      </div>
    </div>
    <div class="module-content">
      <div class="container">
        <form id="ipForm" class="module-form" data-module="ipLookup">
          <div class="module-input-group">
            <label for="ipAddress">IP Address</label>
            <input type="text" id="ipAddress" class="form-input" placeholder="Enter IP address (e.g., 8.8.8.8)">
          </div>
          <button type="submit" class="btn btn-primary">Lookup IP</button>
        </form>
        <div id="resultContainer" class="result-container"></div>
      </div>
    </div>
  </footer>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Data Breach. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
