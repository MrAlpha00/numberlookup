<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Data Breach</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Sign In</a>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join the OSINT investigation community</p>
        </div>
        
        <div class="google-btn-container">
          <div id="googleSignIn"></div>
        </div>
        
        <div class="form-divider">or continue with email</div>
        
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-group">
              <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
              <button type="button" class="toggle-password">👁️</button>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-group">
              <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
              <button type="button" class="toggle-password">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <div class="form-checkbox">
              <input type="checkbox" id="terms" required>
              <label for="terms">I agree to the <a href="terms.html">Terms & Conditions</a> and <a href="privacy.html">Privacy Policy</a></label>
            </div>
          </div>
          <button type="submit" class="btn btn-magenta" style="width: 100%;">Create Account</button>
        </form>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      GoogleAuth.init();
    });
  </script>
</body>
</html>
