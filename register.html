<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Data Breach</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">⚡</div>
        <span>Data Breach</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Sign In</a>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join the OSINT investigation community</p>
        </div>
        
        <!-- Google Sign-In Button -->
        <div class="google-btn-container">
          <div id="googleSignInBtn"></div>
        </div>
        
        <div class="form-divider">or continue with email</div>
        
        <form id="registerForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
              <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
              <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-group">
              <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
              <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <div class="form-checkbox">
              <input type="checkbox" id="terms" required>
              <label for="terms">I agree to the <a href="terms.html">Terms & Conditions</a> and <a href="privacy.html">Privacy Policy</a></label>
            </div>
          </div>
          <button type="submit" class="btn btn-magenta" style="width: 100%;">Create Account</button>
        </form>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    // Toggle password visibility
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
    
    // Password strength checker
    document.getElementById('password').addEventListener('input', function() {
      const password = this.value;
      const strengthBar = document.getElementById('strengthBar');
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      
      strengthBar.className = 'password-strength-bar';
      if (score <= 2) strengthBar.classList.add('weak');
      else if (score <= 4) strengthBar.classList.add('medium');
      else strengthBar.classList.add('strong');
    });
    
    // Initialize Google Sign-In when page loads
    window.onload = function() {
      initGoogleSignIn();
    };
    
    function initGoogleSignIn() {
      // Check if Google script is loaded
      if (typeof google !== 'undefined' && google.accounts) {
        try {
          google.accounts.id.initialize({
            client_id: 'YOUR_CLIENT_ID.apps.googleusercontent.com',
            callback: handleGoogleCredential,
            auto_select: false,
            cancel_on_tap_outside: false
          });
          
          const btn = document.getElementById('googleSignInBtn');
          if (btn) {
            google.accounts.id.renderButton(btn, {
              theme: 'outline',
              size: 'large',
              width: '100%',
              text: 'signup_with'
            });
          }
        } catch(e) {
          console.log('Google Sign-In not configured');
        }
      } else {
        // Load Google Identity Services script
        var script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = initGoogleSignIn;
        script.onerror = function() {
          console.log('Could not load Google Sign-In script');
        };
        document.head.appendChild(script);
      }
    }
    
    function handleGoogleCredential(response) {
      try {
        var payload = JSON.parse(atob(response.credential.split('.')[1]));
        var session = {
          email: payload.email,
          name: payload.name,
          picture: payload.picture,
          googleId: payload.sub,
          loggedIn: true,
          timestamp: Date.now(),
          loginType: 'google'
        };
        localStorage.setItem('databreach_session', JSON.stringify(session));
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Auth error:', error);
        alert('Authentication failed. Please try again.');
      }
    }
    
    // Form submission
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var confirmPassword = document.getElementById('confirmPassword').value;
      var terms = document.getElementById('terms').checked;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }
      
      if (!terms) {
        alert('Please accept the Terms & Conditions');
        return;
      }
      
      // Save user
      var users = JSON.parse(localStorage.getItem('databreach_users') || '[]');
      var exists = users.find(function(u) { return u.email === email; });
      if (exists) {
        alert('Email already registered');
        return;
      }
      
      users.push({ name: name, email: email, password: password, timestamp: Date.now() });
      localStorage.setItem('databreach_users', JSON.stringify(users));
      
      // Login
      var session = {
        email: email,
        name: name,
        loggedIn: true,
        timestamp: Date.now(),
        loginType: 'email'
      };
      localStorage.setItem('databreach_session', JSON.stringify(session));
      
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
